<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bevolkingsdichtheid &ndash; AZ Monica 25km</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Arial,sans-serif;background:#0d1117;color:#e5e7eb;height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#0a1628,#1a3a5c);padding:11px 22px;display:flex;align-items:center;gap:14px;border-bottom:2px solid #00b894;flex-shrink:0}
header h1{font-size:.93rem;font-weight:700;color:#fff}
.badges{margin-left:auto;display:flex;gap:7px;flex-shrink:0}
.badge{padding:3px 10px;border-radius:20px;font-size:.64rem;font-weight:600;border:1px solid;white-space:nowrap}
.bg{background:rgba(0,184,148,.12);color:#00b894;border-color:rgba(0,184,148,.3)}
.bb{background:rgba(255,255,255,.04);color:#9ca3af;border-color:rgba(255,255,255,.1)}
#map{flex:1}
.leaflet-popup-content-wrapper{background:#0c1a2e!important;border:1px solid rgba(0,184,148,.5)!important;border-radius:12px!important;color:#e5e7eb!important}
.leaflet-popup-tip{background:#0c1a2e!important}
.leaflet-popup-content{margin:14px 17px 13px!important;min-width:200px}
.pt{font-size:.97rem;font-weight:700;color:#00b894;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,184,148,.2)}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-bottom:8px}
.pc .lb{font-size:.61rem;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.pc .vl{font-size:.9rem;font-weight:600;color:#f3f4f6;margin-top:2px}
.pc .vl.hi{font-size:1.1rem;color:#00b894}
.bar-bg{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-top:3px}
.bar-fg{height:100%;border-radius:3px}
.legend{background:rgba(8,16,30,.97);border:1px solid rgba(0,184,148,.3);border-radius:10px;padding:12px 14px;min-width:175px;backdrop-filter:blur(12px)}
.legend h4{font-size:.75rem;color:#00b894;font-weight:700;margin-bottom:9px}
.lr{display:flex;align-items:center;gap:8px;margin:3px 0}
.ls{width:22px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.ll{font-size:.71rem;color:#9ca3af}
.stats{background:rgba(8,16,30,.97);border:1px solid rgba(0,184,148,.3);border-radius:10px;padding:11px 14px;min-width:185px;backdrop-filter:blur(12px)}
.stats h4{font-size:.75rem;color:#00b894;font-weight:700;margin-bottom:8px}
.sr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.71rem}
.sr:last-child{border:none}
.sl{color:#6b7280}.sv{color:#f3f4f6;font-weight:600}
.sh{margin-top:7px;font-size:.62rem;color:#374151;font-style:italic}
#ls{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#0d1f3c,#050c18);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;transition:opacity 1s ease}
.lh{font-size:1.1rem;font-weight:700;color:#00b894}
.lp{font-size:.77rem;color:#4b5563;text-align:center;max-width:400px;line-height:1.8}
.spinner{width:38px;height:38px;border:4px solid rgba(0,184,148,.15);border-top-color:#00b894;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pw{width:320px}
.ptxt{font-size:.75rem;color:#9ca3af;margin-bottom:6px;text-align:center}
.pt2{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:6px}
.pb{height:100%;border-radius:4px;transition:width .4s ease;width:0;background:linear-gradient(90deg,#00b894,#55efc4)}
.pstep{font-size:.68rem;color:#374151;min-height:16px;text-align:center}
</style>
</head>
<body>
<header>
  <span style="font-size:1.4rem">&#128506;</span>
  <h1>Bevolkingsdichtheid &ndash; Gemeenten binnen 25 km van AZ Monica Deurne</h1>
  <div class="badges">
    <span class="badge bg">60 zones</span>
    <span class="badge bb">Peiljaar 2024</span>
    <span class="badge bb">&copy; OpenStreetMap</span>
  </div>
</header>
<div id="map"></div>
<div id="ls">
  <div class="lh">&#128506; Kaart laden&hellip;</div>
  <div class="lp">Grenzen worden per batch opgehaald via OpenStreetMap.<br>Duurt circa 60 seconden.</div>
  <div class="spinner"></div>
  <div class="pw">
    <div class="ptxt" id="ptxt">Starten&hellip;</div>
    <div class="pt2"><div class="pb" id="pb"></div></div>
    <div class="pstep" id="pstep">&nbsp;</div>
  </div>
</div>
<script>
const DATA=[
  ["1980","Zemst",540.6,22090,1.3],
  ["2000","Antwerpen (Centrum)",7889,42600,6.4],
  ["2018","Antwerpen (Zuid / Zurenborg)",11186,66000,8.7],
  ["2020","Antwerpen (Linkeroever / Kiel)",4831,28500,4.3],
  ["2030","Antwerpen (Haven / Berendrecht)",125,6658,1.0],
  ["2040","Antwerpen (Ekeren / Zandvliet)",192,10057,1.0],
  ["2050","Antwerpen (Hoboken / Nieuw Zuid)",1591,17500,2.0],
  ["2060","Antwerpen (Noord / Dam / Seefhoek)",13101,45200,10.0],
  ["2070","Zwijndrecht",425.9,18970,1.2],
  ["2100","Deurne",6538,86300,5.4],
  ["2110","Wijnegem",1350.8,8710,1.9],
  ["2140","Borgerhout",11969,46800,9.2],
  ["2150","Borsbeek",2967,11600,3.0],
  ["2160","Wommelgem",1043.9,14830,1.6],
  ["2170","Merksem",6076,48000,5.1],
  ["2180","Ekeren",3452,29000,3.3],
  ["2220","Heist-op-den-Berg",516,51970,1.3],
  ["2240","Zandhoven",334.8,15740,1.1],
  ["2280","Grobbendonk",409.2,13260,1.2],
  ["2290","Vorselaar",292.5,10560,1.1],
  ["2390","Malle",313.1,15870,1.1],
  ["2500","Lier",772.6,36870,1.4],
  ["2520","Ranst",452.3,19240,1.2],
  ["2530","Boechout",680.1,13620,1.4],
  ["2540","Hove",1390.2,10160,1.9],
  ["2547","Lint",1504.1,9030,2.0],
  ["2550","Kontich",916,22360,1.5],
  ["2560","Nijlen",605.9,23230,1.3],
  ["2570","Duffel",800.9,17850,1.5],
  ["2580","Putte",543,17110,1.3],
  ["2600","Berchem",7946,44500,6.4],
  ["2610","Wilrijk",3215,43400,3.1],
  ["2620","Hemiksem",2267.7,9900,2.5],
  ["2627","Schelle",1109.4,8060,1.7],
  ["2630","Aartselaar",1369.7,14680,1.9],
  ["2640","Mortsel",3434.6,28910,3.3],
  ["2650","Edegem",2696,23090,2.8],
  ["2660","Hoboken",3935,42500,3.6],
  ["2800","Mechelen",1362.8,16000,1.9],
  ["2820","Bonheiden",535.8,15890,1.3],
  ["2830","Willebroek",1045.8,28120,1.6],
  ["2840","Rumst",778.7,16040,1.5],
  ["2845","Niel",2063.4,10510,2.3],
  ["2850","Boom",2668.7,17680,2.8],
  ["2860","Sint-Katelijne-Waver",606.2,22690,1.3],
  ["2870","Puurs-Sint-Amands",550.8,22650,1.3],
  ["2880","Bornem",481.3,24050,1.2],
  ["2900","Schoten",1183.5,36170,1.7],
  ["2920","Kalmthout",331.8,20080,1.1],
  ["2930","Brasschaat",995.8,42310,1.6],
  ["2940","Stabroek",885.5,18560,1.5],
  ["2950","Kapellen",751.6,27050,1.4],
  ["2960","Brecht",335.3,30060,1.1],
  ["2970","Schilde",568.3,21820,1.3],
  ["2980","Zoersel",588.6,24720,1.3],
  ["2990","Wuustwezel",245.4,20610,1.1],
  ["9100","Sint-Niklaas",981.7,82740,1.6],
  ["9120","Beveren",425.9,50890,1.2],
  ["9140","Temse",788.4,28650,1.5],
  ["9150","Kruibeke",425.9,16100,1.2],
];

const BATCHES=[["1980", "2000", "2018", "2020", "2030", "2040", "2050", "2060", "2070", "2100", "2110", "2140", "2150", "2160", "2170"],["2180", "2240", "2280", "2290", "2390", "2500", "2520", "2530", "2540", "2547", "2550", "2560", "2570", "2580", "2600"],["2610", "2620", "2627", "2630", "2640", "2650", "2660", "2820", "2830", "2840", "2845", "2850", "2860", "2870", "2880"],["2900", "2920", "2930", "2940", "2950", "2960", "2970", "2980", "2990", "9100", "9120", "9140", "9150"]];
const BY_PC={};
DATA.forEach(([pc,naam,d,inv,s])=>{BY_PC[pc]={pc,naam,d,inv,s};});

function col(d){
  if(d>10000)return"#002e10";if(d>7000)return"#004a1a";if(d>5000)return"#006824";
  if(d>3000)return"#008c32";if(d>2000)return"#12a84c";if(d>1500)return"#2ec065";
  if(d>1000)return"#55d080";if(d>700)return"#82dfa0";if(d>500)return"#aeebc0";
  if(d>300)return"#ccf2d8";return"#e5f9ec";
}
function fmt(n){return Math.round(n).toLocaleString("nl-BE");}

const map=L.map("map",{zoomControl:true});
map.setView([51.21,4.43],10);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png",{
  attribution:"&copy; OpenStreetMap &copy; CARTO",subdomains:"abcd",maxZoom:19
}).addTo(map);

L.control({position:"bottomright"}).onAdd=function(){
  const d=L.DomUtil.create("div","legend");
  d.innerHTML="<h4>&#127807; Dichtheid (inw/km&sup2;)</h4>";
  [[10001,"&gt;10.000"],[7001,"7.000&ndash;10.000"],[5001,"5.000&ndash;7.000"],
   [3001,"3.000&ndash;5.000"],[2001,"2.000&ndash;3.000"],[1501,"1.500&ndash;2.000"],
   [1001,"1.000&ndash;1.500"],[701,"700&ndash;1.000"],[501,"500&ndash;700"],
   [301,"300&ndash;500"],[0,"&lt;300"]].forEach(([v,l])=>{
    d.innerHTML+=`<div class="lr"><div class="ls" style="background:${col(v)}"></div><span class="ll">${l}</span></div>`;
  });
  return d;
}.addTo(map);

L.control({position:"topleft"}).onAdd=function(){
  const d=L.DomUtil.create("div","stats");
  d.innerHTML=`<h4>&#128202; Regio overzicht</h4>
    <div class="sr"><span class="sl">Zones</span><span class="sv">60</span></div>
    <div class="sr"><span class="sl">Totaal inwoners</span><span class="sv">1.588.115</span></div>
    <div class="sr"><span class="sl">Hoogste dichtheid</span><span class="sv" style="color:#00b894">13.101/km&sup2;</span></div>
    <div class="sr"><span class="sl">Laagste dichtheid</span><span class="sv">125/km&sup2;</span></div>
    <div class="sr"><span class="sl">Peiljaar</span><span class="sv">2024</span></div>
    <div class="sh">Klik op een zone voor details</div>`;
  return d;
}.addTo(map);

L.marker([51.1960,4.4558],{
  icon:L.divIcon({html:'<div style="width:18px;height:18px;background:#ef4444;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 3px rgba(239,68,68,.3)"></div>',iconSize:[18,18],iconAnchor:[9,9],className:""}),
  zIndexOffset:2000
}).addTo(map).bindTooltip("<b>&#127973; AZ Monica Deurne</b>",{permanent:false,direction:"top",offset:[0,-10]});

const gLayer=L.geoJSON(null,{
  style:f=>({fillColor:col(f.properties.d),fillOpacity:.82,color:"rgba(255,255,255,.22)",weight:1.1}),
  onEachFeature:(f,layer)=>{
    const g=f.properties;
    layer.on({
      mouseover(e){e.target.setStyle({weight:2.5,color:"rgba(255,255,255,.8)",fillOpacity:.95});e.target.bringToFront();},
      mouseout(e){gLayer.resetStyle(e.target);},
      click(e){
        const pct=Math.min(100,Math.round((g.s/10)*100));
        L.popup({maxWidth:280}).setLatLng(e.latlng).setContent(`
          <div class="pt">&#128205; ${g.naam}</div>
          <div class="pg">
            <div class="pc"><div class="lb">Dichtheid</div><div class="vl hi">${fmt(g.d)}<span style="font-size:.65rem;color:#6b7280"> /km&sup2;</span></div><div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${col(g.d)}"></div></div></div>
            <div class="pc"><div class="lb">Inwoners (2024)</div><div class="vl">${fmt(g.inv)}</div></div>
            <div class="pc"><div class="lb">Postcode</div><div class="vl">${g.pc}</div></div>
            <div class="pc"><div class="lb">Score (1&ndash;10)</div><div class="vl">${g.s.toFixed(1)}</div></div>
          </div>`).openOn(map);
      }
    });
  }
}).addTo(map);

function relToGeo(el){
  if(!el.members)return null;
  const outer=el.members.filter(m=>m.role==="outer"&&m.geometry&&m.geometry.length>1);
  const inner=el.members.filter(m=>m.role==="inner"&&m.geometry&&m.geometry.length>1);
  if(!outer.length)return null;
  function stitch(ways){
    if(ways.length===1){const c=ways[0].geometry.map(p=>[p.lon,p.lat]);if(c[0][0]!==c[c.length-1][0])c.push(c[0]);return[c];}
    const segs=ways.map(w=>({c:w.geometry.map(p=>[p.lon,p.lat]),u:false}));
    const rings=[];
    while(segs.some(s=>!s.u)){
      const s0=segs.find(s=>!s.u);if(!s0)break;s0.u=true;
      let r=[...s0.c],ch=true;
      while(ch){ch=false;const t=r[r.length-1];
        for(const s of segs){if(s.u)continue;
          const h=s.c[0],tl=s.c[s.c.length-1];
          if(Math.abs(h[0]-t[0])<1e-7&&Math.abs(h[1]-t[1])<1e-7){r=r.concat(s.c.slice(1));s.u=true;ch=true;break;}
          if(Math.abs(tl[0]-t[0])<1e-7&&Math.abs(tl[1]-t[1])<1e-7){r=r.concat([...s.c].reverse().slice(1));s.u=true;ch=true;break;}
        }
      }
      if(r[0][0]!==r[r.length-1][0])r.push(r[0]);rings.push(r);
    }
    return rings;
  }
  const oR=stitch(outer),iR=inner.length?stitch(inner):[];
  return oR.length===1?{type:"Polygon",coordinates:[oR[0],...iR]}:{type:"MultiPolygon",coordinates:oR.map(r=>[r])};
}

function wayToGeo(el){
  if(!el.geometry||el.geometry.length<3)return null;
  const c=el.geometry.map(p=>[p.lon,p.lat]);
  if(c[0][0]!==c[c.length-1][0])c.push(c[0]);
  return{type:"Polygon",coordinates:[c]};
}

function setP(pct,txt,step){
  document.getElementById("pb").style.width=pct+"%";
  if(txt)document.getElementById("ptxt").textContent=txt;
  if(step!==undefined)document.getElementById("pstep").textContent=step;
}

const EPS=[
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
  "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
];

async function post(q,ms=30000){
  for(const ep of EPS){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),ms);
      const r=await fetch(ep,{method:"POST",body:"data="+encodeURIComponent(q),
        headers:{"Content-Type":"application/x-www-form-urlencoded"},signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok)continue;
      const d=await r.json();
      if(d.elements&&d.elements.length)return d;
    }catch(e){continue;}
  }
  return null;
}

function addFromElements(elements,pcs){
  const idx={};
  elements.forEach(el=>{
    const pc=el.tags&&(el.tags["postal_code"]||el.tags["addr:postcode"]);
    if(pc&&BY_PC[pc]&&!idx[pc])idx[pc]=el;
  });
  let added=0;
  pcs.forEach(pc=>{
    const el=idx[pc];if(!el)return;
    const geo=el.members?relToGeo(el):wayToGeo(el);
    if(!geo)return;
    gLayer.addData({type:"Feature",geometry:geo,properties:BY_PC[pc]});
    added++;
  });
  return added;
}

async function loadBatch(pcs,batchNum,totalBatches,startPct,endPct){
  setP(startPct,`Batch ${batchNum}/${totalBatches}: ${pcs.length} postcodes...`,pcs.join(", "));
  const pcStr=pcs.join("|");
  const q=`[out:json][timeout:30];(relation["boundary"="postal_code"]["postal_code"~"^(${pcStr})$"];way["boundary"="postal_code"]["postal_code"~"^(${pcStr})$"];);out geom;`;
  const d=await post(q,32000);
  const added=d?addFromElements(d.elements,pcs):0;
  setP(endPct,`Batch ${batchNum} klaar: ${added}/${pcs.length} geladen`,"");
  return added;
}

async function loadAdminPoly(name,props){
  const q=`[out:json][timeout:20];relation["boundary"="administrative"]["admin_level"="8"]["name"="${name}"];out geom;`;
  const d=await post(q,22000);
  if(!d||!d.elements||!d.elements.length)return false;
  const el=d.elements[0];
  const geo=relToGeo(el);if(!geo)return false;
  gLayer.addData({type:"Feature",geometry:geo,properties:props});
  return true;
}

async function loadMap(){
  let total=0;

  // Batch 1-4: postcode polygonen
  total+=await loadBatch(BATCHES[0],1,4,2,24);
  total+=await loadBatch(BATCHES[1],2,4,24,48);
  total+=await loadBatch(BATCHES[2],3,4,48,72);
  total+=await loadBatch(BATCHES[3],4,4,72,88);

  // Mechelen als admin polygoon
  setP(90,"Mechelen laden...","admin_level=8");
  const mechOk=await loadAdminPoly("Mechelen",BY_PC["2800"]);
  if(mechOk)total++;

  // Heist-op-den-Berg als admin polygoon
  setP(94,"Heist-op-den-Berg laden...","admin_level=8");
  const heistOk=await loadAdminPoly("Heist-op-den-Berg",BY_PC["2220"]);
  if(heistOk)total++;

  setP(98,"Kaart renderen...",`${total} zones geladen`);
  await new Promise(r=>setTimeout(r,300));

  try{const b=gLayer.getBounds();if(b.isValid())map.fitBounds(b,{padding:[30,30]});}catch(e){}

  setP(100,`Klaar! ${total} zones geladen.`,"");
  const ls=document.getElementById("ls");
  ls.style.opacity="0";
  setTimeout(()=>{ls.style.display="none";},900);
}

window.addEventListener("load",loadMap);
</script>
</body>
